<!DOCTYPE html>
<html>
<head>
<title>Age Calculator</title>

<style>
body{font-family:Arial;background:#0f172a;color:#fff;margin:0;}
.box{max-width:600px;margin:auto;padding:20px;}
.card{background:#1e293b;padding:20px;border-radius:12px;text-align:center;}

input,button{
width:100%;
padding:12px;
margin:10px 0;
border:none;
border-radius:8px;
}

button{background:#38bdf8;font-weight:bold;}
</style>
</head>

<body>

<div class="box">
<div class="card">

<h2>Age Calculator</h2>

<input type="date" id="dob" placeholder="YYYY-MM-DD">
<button onclick="calc()">Calculate</button>

<p id="result"></p>

<p>Calculate your exact age instantly.</p>

<button onclick="history.back()">Back</button>

</div>
</div>

<script>
function calc(){

let dobValue = document.getElementById("dob").value;

if(dobValue === ""){
  document.getElementById("result").innerHTML = "Please select date";
  return;
}

let dob = new Date(dobValue);
let today = new Date();

let years = today.getFullYear() - dob.getFullYear();
let months = today.getMonth() - dob.getMonth();
let days = today.getDate() - dob.getDate();

/* days adjust */
if(days < 0){
  months--;
  let lastMonth = new Date(today.getFullYear(), today.getMonth(), 0).getDate();
  days += lastMonth;
}

/* months adjust */
if(months < 0){
  years--;
  months += 12;
}

document.getElementById("result").innerHTML =
"Age: " + years + " Years, " + months + " Months, " + days + " Days";

}
</script>

</body>
</html>
