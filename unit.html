<!DOCTYPE html>
<html>
<head>
<title>Unit Converter</title>

<style>
body{
  font-family: Arial;
  background:#0f172a;
  color:#fff;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  margin:0;
}

.box{
  background:#1e293b;
  padding:20px;
  border-radius:12px;
  width:90%;
  max-width:400px;
  text-align:center;
}

input, select{
  width:100%;
  padding:12px;
  margin:10px 0;
  border-radius:8px;
  border:none;
  font-size:16px;
}

button{
  width:100%;
  padding:12px;
  margin-top:10px;
  border:none;
  border-radius:8px;
  background:#38bdf8;
  font-weight:bold;
  cursor:pointer;
}

#result{
  margin-top:15px;
  font-size:18px;
}
</style>

</head>

<body>

<div class="box">
  <h2>Unit Converter</h2>

  <input type="number" id="value" placeholder="Enter value">

  <select id="from">
    <option value="m">Meter</option>
    <option value="cm">Centimeter</option>
    <option value="km">Kilometer</option>
    <option value="ft">Foot</option>
  </select>

  <select id="to">
    <option value="m">Meter</option>
    <option value="cm">Centimeter</option>
    <option value="km">Kilometer</option>
    <option value="ft">Foot</option>
  </select>

  <button onclick="convert()">Convert</button>

  <p id="result"></p>

  <br>
  <a href="index.html">
    <button>← Back</button>
  </a>
</div>

<script>
function convert(){
  let val = document.getElementById("value").value;
  let from = document.getElementById("from").value;
  let to = document.getElementById("to").value;

  let meter;

  if(from=="m") meter = val;
  if(from=="cm") meter = val/100;
  if(from=="km") meter = val*1000;
  if(from=="ft") meter = val*0.3048;

  let result;

  if(to=="m") result = meter;
  if(to=="cm") result = meter*100;
  if(to=="km") result = meter/1000;
  if(to=="ft") result = meter/0.3048;

  document.getElementById("result").innerText = result;
}
</script>

</body>
</html>
